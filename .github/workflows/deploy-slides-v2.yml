name: Deploy Slides v2

on:
  push:
    branches:
      - fer
    paths:
      - 'docs/arquitectura-v2/**'
      - '.github/workflows/deploy-slides-v2.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fer branch
        uses: actions/checkout@v4
        with:
          ref: fer

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/arquitectura-v2/package-lock.json

      - name: Install dependencies
        run: |
          cd docs/arquitectura-v2
          npm ci

      - name: Build
        run: |
          cd docs/arquitectura-v2
          npm run build

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-branch

      - name: Copy build to main/docs/arquitectura-v2
        run: |
          rm -rf main-branch/docs/arquitectura-v2
          cp -r docs/arquitectura-v2/dist main-branch/docs/arquitectura-v2

      - name: Commit and push to main
        run: |
          cd main-branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/arquitectura-v2
          git diff --cached --quiet || (git commit -m "deploy(slides): update arquitectura-v2 from fer branch" && git push origin main)
