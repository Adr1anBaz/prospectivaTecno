# Configuración del sitio Jekyll con Just the Docs

# Información del sitio
title: Prácticas - IA
description: Repositorio de prácticas del curso de IA Generativa y Prospectiva Tecnológica
author: Adrian Bazaldua

# URL del sitio
url: "https://adr1anbaz.github.io"
baseurl: "/prospectivaTecno"

# Tema
remote_theme: just-the-docs/just-the-docs

# Color scheme (dark mode habilitado)
color_scheme: dark

# Callouts styling
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Importante
    color: blue
  new:
    title: Nuevo
    color: green
  note:
    title: Nota
    color: purple
  warning:
    title: Advertencia
    color: red

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Heading anchor links
heading_anchors: true

# Footer
footer_content: "Copyright &copy; 2026 Adrian Bazaldua. Curso de IA Generativa y Prospectiva Tecnológica - Verano 2026"

# Footer links
gh_edit_link: true
gh_edit_link_text: "Editar en GitHub"
gh_edit_repository: "https://github.com/Adr1anBaz/prospectivaTecno"
gh_edit_branch: "main"
gh_edit_view_mode: "tree"

# Back to top link
back_to_top: true
back_to_top_text: "Volver arriba"

# Include directories (fuerza inclusión de directorios estáticos)
include:
  - Robot-Guided-Navigation-Through-Conversational-AI
  - .nojekyll

# Exclude de la construcción
exclude:
  - node_modules/
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .venv/
  - __pycache__/
  - "*.py"
  - scripts/
  - "*.jsx"
  - "*.json"
  - src/

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# kramdown options
kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Enable copy button on code
enable_copy_code_button: true

# Aux links (links adicionales en el header)
aux_links:
  "Ver en GitHub":
    - "https://github.com/Adr1anBaz/prospectivaTecno"
  "Repositorio Completo":
    - "https://github.com/Adr1anBaz/prospectivaTecno"

# Navigation
nav_sort: order
nav_enabled: true
