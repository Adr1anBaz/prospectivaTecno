# Configuración de comandos del Asistente Universitario
# Agregar nuevos comandos es muy fácil:
# 1. Copiar una entrada existente
# 2. Cambiar el nombre, patterns y response
# 3. Reiniciar el asistente

commands:
  # Navegación
  - name: "NAVEGAR_BIOMEDICA"
    category: "navigation"
    patterns:
      - "biomédica"
      - "biomedica"
      - "edificio de biomédica"
      - "llévame a biomédica"
    response: "Voy al edificio de Biomédica."
    action: "navigate"
    params:
      destination: "BIOMEDICA"

  - name: "NAVEGAR_GIORNALE"
    category: "navigation"
    patterns:
      - "giornale"
      - "edificio giornale"
      - "llévame al giornale"
    response: "Voy al edificio Giornale."
    action: "navigate"
    params:
      destination: "GIORNALE"

  - name: "NAVEGAR_BIBLIOTECA"
    category: "navigation"
    patterns:
      - "biblioteca"
      - "biblio"
      - "llévame a la biblioteca"
    response: "Voy a la Biblioteca Central."
    action: "navigate"
    params:
      destination: "BIBLIOTECA"

  - name: "NAVEGAR_CAFETERIA"
    category: "navigation"
    patterns:
      - "cafetería"
      - "cafeteria"
      - "comer"
      - "llévame a la cafetería"
    response: "Voy a la cafetería."
    action: "navigate"
    params:
      destination: "CAFETERIA"

  # Comandos del robot
  - name: "COMANDO_SIT"
    category: "robot"
    patterns:
      - "sientate"
      - "siéntate"
      - "sentarse"
      - "siente"
      - "sentado"
      - "sentar"
      - "siéntate"
    response: "Me siento."
    action: "sit"
    params: {}

  - name: "COMANDO_DANCE"
    category: "robot"
    patterns:
      - "baila"
      - "bailar"
      - "danza"
      - "bailando"
      - "dance"
      - "baile"
    response: "¡Bailando!"
    action: "dance"
    params: {}

  - name: "COMANDO_STAND"
    category: "robot"
    patterns:
      - "parate"
      - "pararte"
      - "levántate"
      - "levantate"
      - "ponte de pie"
      - "para"
      - "de pie"
      - "parado"
      - "pie"
    response: "Me pongo de pie."
    action: "stand"
    params: {}

  - name: "COMANDO_WAVE"
    category: "robot"
    patterns:
      - "saluda"
      - "saludar"
      - "hola"
      - "saludo"
      - "wave"
      - "hola robot"
      - "di hola"
    response: "¡Hola!"
    action: "wave"
    params: {}

  - name: "COMANDO_WALK"
    category: "robot"
    patterns:
      - "camina"
      - "caminar"
      - "anda"
      - "caminata"
      - "caminando"
      - "camine"
      - "walk"
    response: "Caminando."
    action: "walk"
    params: {}

  - name: "COMANDO_STOP"
    category: "robot"
    patterns:
      - "detente"
      - "deten"
      - "parar"
      - "alto"
      - "para"
      - "stop"
      - "quieto"
    response: "Detenido."
    action: "stop"
    params: {}

  # Conversación general
  - name: "HABLAR"
    category: "conversation"
    patterns: []
    response: ""
    action: "llm"
    params: {}
