<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Chatbot</title>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>Chatbot</h1>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item" id="newConversation">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          Nueva conversación
        </button>

        <button class="nav-item active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          Chats
        </button>

        <button class="nav-item" id="toggleControls">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 1v6m0 6v6M5.6 5.6l4.2 4.2m4.2 4.2l4.2 4.2M1 12h6m6 0h6M5.6 18.4l4.2-4.2m4.2-4.2l4.2-4.2"/>
          </svg>
          Configuración
        </button>
      </nav>

      <div class="recent-conversations">
        <h3>Recientes</h3>
        <div id="recentList"></div>
      </div>
    </aside>

    <!-- Main Content -->
    <section class="main-content">
      <!-- Profile Status Bar -->
      <div class="profile-status-bar" id="profileStatusBar" style="display: none;">
        <div class="status-content">
          <span class="status-icon">🤖</span>
          <span class="status-text">Conversando con: <strong id="statusProfileName">Asistente genérico</strong></span>
        </div>
      </div>

      <section class="header" id="welcomeHeader">
        <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <h1>Bienvenido</h1>
        <p>¿En qué puedo ayudarte?</p>
      </section>

      <div class="layout">
        <section class="chat-panel">
          <div id="chat" class="chat"></div>

          <div class="chat-form-container">
            <form id="chatForm" class="chat-form">
              <textarea
                id="message"
                rows="1"
                placeholder="Escribe tu mensaje... (Enter para enviar, Shift+Enter para nueva línea)"
                required
              ></textarea>

              <button id="sendBtn" type="submit">Enviar</button>
            </form>
          </div>
        </section>
      </div>

      <!-- Floating Metrics Button -->
      <button class="metrics-toggle-btn" id="metricsToggleBtn" style="display: none;" title="Ver métricas">
        📊
      </button>

      <!-- Metrics Modal -->
      <div class="metrics-modal" id="metricsModal">
        <div class="metrics-modal-content">
          <div class="metrics-modal-header">
            <h2>📊 Métricas de la última respuesta</h2>
            <button class="metrics-close-btn" id="metricsCloseBtn">✕</button>
          </div>
          <div id="metricsGrid" class="metrics-grid"></div>
        </div>
      </div>
    </section>

    <!-- Controls Panel -->
    <aside class="controls-panel" id="controlsPanel">
      <h2>Configuración del Copiloto</h2>

      <!-- Active Profile Indicator -->
      <div class="active-profile-badge" id="activeProfileBadge">
        <div class="badge-icon">🤖</div>
        <div class="badge-content">
          <div class="badge-label">Perfil Activo</div>
          <div class="badge-value" id="activeProfileName">Asistente genérico</div>
        </div>
      </div>

      <label>
        Seleccionar perfil de copiloto
        <select id="copilot_profile">
          <option value="generico">Asistente genérico</option>
          <option value="docente">Copiloto docente universitario</option>
          <option value="robotica">Copiloto de robótica móvil</option>
          <option value="programacion">Copiloto de programación Python</option>
          <option value="investigacion">Copiloto de investigación académica</option>
        </select>
      </label>

      <button id="loadProfileBtn" type="button" class="load-profile-btn">
        📋 Cargar plantilla del perfil
      </button>

      <label>
        System prompt (editable)
        <textarea id="system_prompt" rows="6" placeholder="Se cargará automáticamente al seleccionar un perfil..."></textarea>
      </label>

      <label>
        Modelo
        <select id="model">
          <option value="llama3.2:3b">llama3.2:3b</option>
          <option value="qwen2.5:3b">qwen2.5:3b</option>
          <option value="qwen2.5:1.5b">qwen2.5:1.5b</option>
          <option value="llama3.2:1b">llama3.2:1b</option>
          <option value="qwen2.5:0.5b">qwen2.5:0.5b</option>
        </select>
      </label>

      <label>
        Temperatura
        <input id="temperature" type="number" min="0" max="1.2" step="0.1" value="0.7" />
      </label>

      <label>
        Top-p
        <input id="top_p" type="number" min="0.1" max="1" step="0.05" value="0.9" />
      </label>

      <label>
        Tokens máximos de salida
        <input id="num_predict" type="number" min="20" max="4000" step="50" value="800" />
      </label>

      <label>
        Contexto
        <select id="num_ctx">
          <option value="2048">2048</option>
          <option value="4096" selected>4096</option>
          <option value="8192">8192</option>
        </select>
      </label>

      <label>
        Repeat penalty
        <input id="repeat_penalty" type="number" min="1" max="2" step="0.1" value="1.1" />
      </label>

      <button id="clearBtn" type="button">Limpiar conversación</button>
    </aside>
  </main>

  <script src="app.js"></script>
</body>
</html>
